name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with test dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest --tb=short -q

      - name: Verify CLI runs
        run: |
          scan-litellm --list-threats
          python -m scan_litellm_compromise --list-threats

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Check linting
        run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install mypy
        run: pip install mypy

      - name: Run mypy
        run: mypy scan_litellm_compromise/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify wheel contains threat profiles
        run: |
          python -c "
          import zipfile, sys
          whl = list(__import__('pathlib').Path('dist').glob('*.whl'))[0]
          with zipfile.ZipFile(whl) as z:
              toml_files = [n for n in z.namelist() if n.endswith('.toml') and 'threats/' in n]
              print(f'Threat profiles in wheel: {toml_files}')
              if len(toml_files) < 2:
                  print('ERROR: expected at least 2 threat profiles')
                  sys.exit(1)
          "

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "from scan_litellm_compromise import __version__; print(__version__)")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: tag version ($TAG_VERSION) != package version ($PKG_VERSION)"
            exit 1
          fi

  publish:
    if: github.event_name == 'release'
    needs: [test, lint, typecheck, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
